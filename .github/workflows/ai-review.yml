name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

# 1. FIX: Grant explicit permissions
permissions:
  contents: read
  pull-requests: write
  # This might be needed if the action tries to read variables
  actions: read 

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: AI Code Reviewer
        uses: anc95/ChatGPT-CodeReview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          MODEL: gpt-3.5-turbo

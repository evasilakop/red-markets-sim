name: Kodus AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  
  # This enables the manual button
  workflow_dispatch: 

permissions:
  contents: read
  pull-requests: write

jobs:
  kodus-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Kodus AI Reviewer
        uses: kodus-ai/reviewer-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Add your API key secret here if required
          # api_key: ${{ secrets.KODUS_API_KEY }}
